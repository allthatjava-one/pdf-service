name = "pdf-compressor-service"
main = "src/index.py"
compatibility_date = "2024-12-18"
compatibility_flags = ["python_workers"]
port = 8787

# ---------------------------------------------------------------------------
# R2 Bucket binding — gives the Worker access to your R2 bucket as env.R2_BUCKET
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding    = "R2_BUCKET"
bucket_name = "pdf-compressor"

# ---------------------------------------------------------------------------
# Non-sensitive environment variables
# Sensitive values (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY) must be stored as
# Wrangler secrets:
#   wrangler secret put R2_ACCESS_KEY_ID
#   wrangler secret put R2_SECRET_ACCESS_KEY
# ---------------------------------------------------------------------------
[vars]
# Cloudflare Account ID — set via .dev.vars locally or `wrangler secret put` in production.
# Do NOT hardcode this value here.
# R2_ACCOUNT_ID = ""

# R2 bucket name (must match the bucket_name above)
R2_BUCKET_NAME = "pdf-compressor"

# Comma-separated list of allowed origins for CORS, or "*" for all
ALLOWED_ORIGINS = "https://your-frontend.com"

# Lifetime of the generated presigned URL in seconds (default 1 hour)
PRESIGNED_URL_EXPIRY = "3600"

# Minimum age (in minutes) a "-compressed" file must reach before the
# scheduled cleanup will delete it.  Tune this to match your cron frequency.
CLEANUP_MINUTES = "60"

# ---------------------------------------------------------------------------
# Cron Triggers — scheduled cleanup of old compressed files.
# Adjust the cron expression to match your desired cleanup frequency.
# Default: every hour at the top of the hour.
# Reference: https://developers.cloudflare.com/workers/configuration/cron-triggers/
# ---------------------------------------------------------------------------
[triggers]
crons = ["*/5 * * * *"]   # every hour — change to e.g. "*/30 * * * *" for every 30 min
